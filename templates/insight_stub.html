<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — TSR Golf Database</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1219;
      --panel: #161c27;
      --border: #2a3650;
      --accent: #2dd4bf;
      --text: #e0e4ee;
      --text-muted: #8a99b4;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 1.25rem 1rem 0.75rem;
      border-bottom: 1px solid var(--border);
      position: relative;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--accent);
    }

    main {
      flex: 1;
      padding: 2rem clamp(1rem, 3vw, 2.5rem);
      width: 100%;
    }

    main p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <header>
    <h1>{{ title }}</h1>
  </header>
  <main>
    <p>coming soon</p>
  </main>
</body>
</html>
